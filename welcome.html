<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Välkommen – Midsommar 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;700&family=Fanwood+Text&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-welcome">

  <!-- SVG filter definitions — heat-warp displacement -->
  <svg aria-hidden="true" style="position:absolute;pointer-events:none;width:0;height:0;overflow:hidden">
    <defs>
      <filter id="heat-warp" x="-8%" y="-8%" width="116%" height="116%">
        <feTurbulence type="fractalNoise" baseFrequency="0.013 0.008" numOctaves="3" seed="42" result="noise">
          <animate attributeName="baseFrequency"
                   values="0.013 0.008;0.023 0.015;0.008 0.005;0.019 0.011;0.013 0.008"
                   dur="22s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <!-- Top nav kept for food.html compatibility; hidden on welcome via CSS -->

  <div class="welcome-page">

    <!-- Hero: morphing photo slideshow, 668/1920 aspect ratio -->
    <div class="hero-wrapper">
      <div class="hero-slideshow" id="heroSlideshow"></div>
      <div class="hero-tint"></div>
      <div class="hero-inner-frame"></div>
      <div class="hero-prism"></div>
      <div class="hero-scanlines"></div>
      <canvas class="hero-grain" id="heroGrain"></canvas>
    </div>

    <!-- Botanical vector decorations (SVG spans full page proportionally) -->
    <img class="botanical-overlay" src="images/botanical-overlay.svg" alt="" aria-hidden="true">

    <!-- Content area below hero -->
    <div class="content-area">
      <div class="content-panel">

        <!-- Navigation (Figma: "links" frame at top of panel) -->
        <nav class="panel-nav">
          <a href="welcome.html" class="panel-nav-link active">Info</a>
          <a href="food.html" class="panel-nav-link">Mat &amp; tobak</a>
          <a href="#" class="panel-nav-link panel-nav-logout" id="logoutBtn">Logga ut</a>
        </nav>

        <section class="welcome-section">
          <h2 class="welcome-heading">välkommen</h2>
          <p class="welcome-text">
            [Placeholder – ersätt med din välkomsttext. Berätta om evenemanget,
            vad som händer och all viktig info som gästerna behöver veta!]
          </p>
        </section>

        <section class="welcome-section last">
          <h2 class="welcome-heading">tema</h2>
          <p class="welcome-text">
            [Placeholder – adress, datum, tider, klädkod, etc.
            Anmäl dig till maten på <a href="food.html">Mat &amp; Dryck-sidan</a>!]
          </p>
        </section>

      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
  <script src="js/welcome.js"></script>
</body>
</html>
